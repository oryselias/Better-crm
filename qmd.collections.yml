collections:
  - name: better-crm
    path: .
    include:
      - "**/*.{ts,tsx,js,jsx,md,json,html,css,yml,sql,toml}"
    exclude:
      - "node_modules/**"
      - ".next/**"
      - "dist/**"
      - ".git/**"
      - ".qmd/**"
      - ".tools/**"
      - ".env*.local"
      - "output/**"
      - "TEST-DATA/**"
      - ".playwright-cli/**"
      - "scripts/e2e/**"
      - "coverage/**"
      - "public/**"
      - "**/*.lock"
      - "**/*.sqlite"
      - "**/*.sqlite-wal"
      - "**/*.sqlite-shm"
      - "supabase/.temp/**"
